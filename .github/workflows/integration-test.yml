name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  setup-tailnet:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tailnet_name: ${{ steps.create.outputs.tailnet_name }}
      ts_authkey: ${{ steps.authkey.outputs.ts_authkey }}

    steps:
      - uses: actions/checkout@v6

      - name: Get OIDC token
        id: oidc
        run: |
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api.tailscale.com/TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL" \
            | jq -r '.value')
          echo "::add-mask::$JWT"
          echo "jwt=$JWT" >> "$GITHUB_OUTPUT"

      - name: Exchange OIDC token for org access token
        id: token
        run: |
          ACCESS_TOKEN=$(./integration_test/scripts/exchange-oidc-token.sh \
            "TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL" \
            "${{ steps.oidc.outputs.jwt }}")
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Create ephemeral tailnet
        id: create
        run: |
          DISPLAY_NAME="tailvoy-ci-${{ github.run_id }}"
          CREATE_OUTPUT=$(./integration_test/scripts/create-tailnet.sh \
            "${{ steps.token.outputs.access_token }}" \
            "$DISPLAY_NAME")

          TAILNET_NAME=$(echo "$CREATE_OUTPUT" | jq -r '.dnsName // .tailnetName')
          OAUTH_CLIENT_ID=$(echo "$CREATE_OUTPUT" | jq -r '.oauthClient.id // .oauthClient.oauthClientID')
          OAUTH_CLIENT_SECRET=$(echo "$CREATE_OUTPUT" | jq -r '.oauthClient.secret // .oauthClient.oauthClientSecret')

          if [ -z "$TAILNET_NAME" ] || [ "$TAILNET_NAME" = "null" ]; then
            echo "Error: could not extract dnsName from create response" >&2
            echo "$CREATE_OUTPUT" >&2
            exit 1
          fi
          if [ -z "$OAUTH_CLIENT_ID" ] || [ "$OAUTH_CLIENT_ID" = "null" ]; then
            echo "Error: could not extract oauthClient.id from create response" >&2
            exit 1
          fi

          echo "::add-mask::$OAUTH_CLIENT_SECRET"
          echo "tailnet_name=$TAILNET_NAME" >> "$GITHUB_OUTPUT"
          echo "oauth_client_id=$OAUTH_CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "oauth_client_secret=$OAUTH_CLIENT_SECRET" >> "$GITHUB_OUTPUT"

      - name: Get tailnet-scoped access token
        id: tailnet_token
        run: |
          TAILNET_TOKEN=$(./integration_test/scripts/get-access-token.sh \
            "${{ steps.create.outputs.oauth_client_id }}" \
            "${{ steps.create.outputs.oauth_client_secret }}")
          echo "::add-mask::$TAILNET_TOKEN"
          echo "tailnet_token=$TAILNET_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Apply test ACL
        run: |
          ./integration_test/scripts/update-acl.sh \
            "${{ steps.tailnet_token.outputs.tailnet_token }}" \
            "${{ steps.create.outputs.tailnet_name }}" \
            ./integration_test/scripts/test-acl.json

      - name: Create auth key
        id: authkey
        run: |
          AUTHKEY_JSON=$(./integration_test/scripts/create-auth-key.sh \
            "${{ steps.tailnet_token.outputs.tailnet_token }}" \
            "${{ steps.create.outputs.tailnet_name }}" \
            "kind" true true true)
          TS_AUTHKEY=$(echo "$AUTHKEY_JSON" | jq -r '.key')
          echo "::add-mask::$TS_AUTHKEY"
          echo "ts_authkey=$TS_AUTHKEY" >> "$GITHUB_OUTPUT"

  kind-test:
    needs: setup-tailnet
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install grpcurl
        run: |
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin grpcurl

      - name: Install ncat
        run: sudo apt-get install -y ncat

      - name: Install Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ needs.setup-tailnet.outputs.ts_authkey }}

      - name: Run kind integration tests
        env:
          TS_AUTHKEY: ${{ needs.setup-tailnet.outputs.ts_authkey }}
        run: make kind-test

      - name: Collect logs on failure
        if: failure()
        run: |
          kubectl logs -n envoy-gateway-system -l gateway.envoyproxy.io/owning-gateway-name=eg --tail=200 > tailvoy-data-plane.log 2>&1 || true
          kubectl logs -n envoy-gateway-system -l control-plane=envoy-gateway --tail=100 > eg-controller.log 2>&1 || true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: kind-test-logs
          path: |
            tailvoy-data-plane.log
            eg-controller.log
          retention-days: 7

  cleanup-tailnet:
    if: always()
    needs: [setup-tailnet, kind-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Get OIDC token
        id: oidc
        run: |
          JWT=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api.tailscale.com/TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL" \
            | jq -r '.value')
          echo "::add-mask::$JWT"
          echo "jwt=$JWT" >> "$GITHUB_OUTPUT"

      - name: Exchange OIDC token for access token
        id: token
        run: |
          ACCESS_TOKEN=$(./integration_test/scripts/exchange-oidc-token.sh \
            "TbqNGJkY5611CNTRL-kz4CwX2LK721CNTRL" \
            "${{ steps.oidc.outputs.jwt }}")
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Delete ephemeral tailnet
        continue-on-error: true
        run: |
          ./integration_test/scripts/delete-tailnet.sh \
            "${{ steps.token.outputs.access_token }}" \
            "${{ needs.setup-tailnet.outputs.tailnet_name }}"
