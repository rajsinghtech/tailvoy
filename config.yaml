# Example tailvoy config
# Copy and modify for your deployment
#
# Authorization is defined in your Tailscale ACL policy (policy.hujson)
# using peer capability grants with "rajsingh.info/cap/tailvoy".
# See docs/plans/2026-03-04-cap-based-policy-design.md for details.
#
# Authentication: set TS_CLIENT_ID and TS_CLIENT_SECRET env vars.

tailscale:
  service: tailvoy-gw
  tags:
    - tag:tailvoy
  serviceTags:
    - tag:tailvoy

listeners:
  https:
    port: 443
    protocol: https
    tls:
      cert: /certs/cert.pem
      key: /certs/key.pem
    routes:
      - backend: 127.0.0.1:10443

  http:
    port: 80
    protocol: http
    routes:
      - backend: 127.0.0.1:10080
