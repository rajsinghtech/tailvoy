services:
  backend:
    build:
      context: ./backend

  tcp-echo:
    build:
      context: ./backend/tcp-echo

  udp-echo:
    build:
      context: ./backend/udp-echo

  tailvoy:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - TS_CLIENT_ID=${TS_CLIENT_ID}
      - TS_CLIENT_SECRET=${TS_CLIENT_SECRET}
    command:
      - "--policy"
      - "/policy.yaml"
      - "--standalone"
      - "--log-level"
      - "debug"
    volumes:
      - ./full-test-policy.yaml:/policy.yaml:ro
    depends_on:
      - backend
      - tcp-echo
      - udp-echo
