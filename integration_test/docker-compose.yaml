services:
  backend:
    build:
      context: ./backend
    ports:
      - "18080:8080"

  tailvoy:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - TS_CLIENT_ID=${TS_CLIENT_ID}
      - TS_CLIENT_SECRET=${TS_CLIENT_SECRET}
    command:
      - "--config"
      - "/config.yaml"
      - "--standalone"
      - "--log-level"
      - "debug"
    volumes:
      - ./l7-test-policy-docker.yaml:/config.yaml:ro
    depends_on:
      - backend
