services:
  backend:
    build:
      context: ../backend

  backend-alt:
    build:
      context: ../backend
    environment:
      - PORT=8081

  tcp-echo:
    build:
      context: ../backend/tcp-echo

  udp-echo:
    build:
      context: ../backend/udp-echo

  tls-echo:
    build:
      context: ../backend/tls-echo

  grpc-echo:
    build:
      context: ../backend/grpc-echo

  tailvoy:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      - TS_CLIENT_ID=${TS_CLIENT_ID}
      - TS_CLIENT_SECRET=${TS_CLIENT_SECRET}
    command:
      - "--config"
      - "/config.yaml"
      - "--log-level"
      - "debug"
    volumes:
      - ./full-test-policy.yaml:/config.yaml:ro
    depends_on:
      - backend
      - backend-alt
      - tcp-echo
      - udp-echo
      - tls-echo
      - grpc-echo
