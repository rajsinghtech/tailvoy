tailscale:
  service: "tailvoy-docker-test"
  clientId: "${TS_CLIENT_ID}"
  clientSecret: "${TS_CLIENT_SECRET}"
  tags:
    - "tag:integration"
  serviceTags:
    - "tag:integration"

listeners:
  - name: http
    protocol: tcp
    listen: ":80"
    forward: "backend:8080"
    l7_policy: true

  - name: tcp
    protocol: tcp
    listen: ":5432"
    forward: "tcp-echo:9000"

  - name: udp
    protocol: udp
    listen: ":9053"
    forward: "udp-echo:9053"

  - name: no-access
    protocol: tcp
    listen: ":9999"
    forward: "backend:8080"
