tailscale:
  hostname: "tailvoy-full-test"
  authkey: "${TS_AUTHKEY}"
  ephemeral: true

listeners:
  - name: http
    protocol: tcp
    listen: ":80"
    forward: "backend:8080"
    l7_policy: true

  - name: open-tcp
    protocol: tcp
    listen: ":8081"
    forward: "backend:8080"
    l7_policy: false

  - name: user-restricted
    protocol: tcp
    listen: ":8082"
    forward: "backend:8080"
    l7_policy: false

  - name: tag-restricted
    protocol: tcp
    listen: ":8083"
    forward: "backend:8080"
    l7_policy: false

  - name: passthrough
    protocol: tcp
    listen: ":8084"
    forward: "backend:8080"
    l7_policy: false
