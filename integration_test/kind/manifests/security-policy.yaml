apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: ext-authz
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: http-route
    - group: gateway.networking.k8s.io
      kind: GRPCRoute
      name: grpc-route
  extAuth:
    headersToExtAuth:
      - x-forwarded-for
      - x-envoy-external-address
      - x-envoy-original-path
      - host
    http:
      backendRefs:
        - name: tailvoy-authz
          namespace: envoy-gateway-system
          port: 9001
      headersToBackend:
        - x-tailscale-user
        - x-tailscale-node
        - x-tailscale-tags
        - x-tailscale-ip
