apiVersion: v1
kind: ConfigMap
metadata:
  name: tailvoy-policy
  namespace: envoy-gateway-system
data:
  config.yaml: |
    tailscale:
      hostname: tailvoy-kind-test-tailvoy
      serviceMappings:
        kind-http: [default/eg/http]
        kind-tcp: [default/eg/tcp]
        kind-grpc: [default/eg/grpc]
        kind-tls: [default/eg/tls]
        kind-http-alias: [default/eg/http]
      tags:
        - tag:kind
      serviceTags:
        - tag:kind-svc
    discovery:
      envoyAdmin: http://127.0.0.1:19000
      envoyAddress: 127.0.0.1
      pollInterval: 5s
      healthPolicy: any
      unhealthyThreshold: 2
      proxyProtocol: v2
---
apiVersion: v1
kind: Service
metadata:
  name: tailvoy-authz
  namespace: envoy-gateway-system
spec:
  selector:
    gateway.envoyproxy.io/owning-gateway-name: eg
    gateway.envoyproxy.io/owning-gateway-namespace: default
  ports:
    - port: 9001
      targetPort: 9001
      protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-securitypolicy-to-authz
  namespace: envoy-gateway-system
spec:
  from:
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: default
  to:
    - group: ""
      kind: Service
      name: tailvoy-authz
