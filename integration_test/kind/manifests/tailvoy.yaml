apiVersion: v1
kind: ConfigMap
metadata:
  name: tailvoy-policy
data:
  policy.yaml: |
    tailscale:
      hostname: "tailvoy-kind-test"
      authkey: "${TS_AUTHKEY}"
      ephemeral: true
    listeners:
      - name: default
        protocol: tcp
        listen: ":80"
        forward: "PLACEHOLDER_EG_SVC:8080"
        l7_policy: true
        proxy_protocol: v2
    l4_rules:
      - match:
          listener: default
        allow:
          any_tailscale: true
    l7_rules:
      - match:
          listener: default
          path: "/admin/*"
        allow:
          tags: ["tag:admin-only"]
      - match:
          listener: default
          path: "/host-test/*"
          host: "admin.tailvoy.test"
        allow:
          users: ["rajsinghtech@github"]
      - match:
          listener: default
          path: "/readonly/*"
          methods: ["GET", "HEAD"]
        allow:
          any_tailscale: true
      - match:
          listener: default
          path: "/public/*"
        allow:
          any_tailscale: true
      - match:
          listener: default
          path: "/health"
        allow:
          any_tailscale: true
      - match:
          listener: default
          path: "/"
        allow:
          any_tailscale: true
    default: deny
---
apiVersion: v1
kind: Service
metadata:
  name: tailvoy-authz
spec:
  selector:
    app: tailvoy
  ports:
    - port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailvoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailvoy
  template:
    metadata:
      labels:
        app: tailvoy
    spec:
      containers:
        - name: tailvoy
          image: tailvoy:test
          imagePullPolicy: Never
          args:
            - --policy
            - /etc/tailvoy/policy.yaml
            - --authz-addr
            - 0.0.0.0:9001
            - --log-level
            - debug
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailvoy-authkey
                  key: TS_AUTHKEY
          ports:
            - containerPort: 9001
              name: authz
          volumeMounts:
            - name: policy
              mountPath: /etc/tailvoy
              readOnly: true
      volumes:
        - name: policy
          configMap:
            name: tailvoy-policy
