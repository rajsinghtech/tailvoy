tailscale:
  hostname: "tailvoy-l7-test"
  tailnet: "${TS_TAILNET}"
  clientId: "${TS_CLIENT_ID}"
  clientSecret: "${TS_CLIENT_SECRET}"
  tags:
    - "tag:integration"
  serviceTags:
    - "tag:integration"

listeners:
  - name: web
    protocol: tcp
    listen: ":80"
    forward: "backend:8080"
    l7_policy: true
