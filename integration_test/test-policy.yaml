tailscale:
  hostname: "tailvoy-integration-test"
  authkey: "${TS_AUTHKEY}"
  ephemeral: true

listeners:
  - name: web
    protocol: tcp
    listen: ":80"
    forward: "127.0.0.1:8080"
    l7_policy: true

  - name: restricted-port
    protocol: tcp
    listen: ":9999"
    forward: "127.0.0.1:8080"
    l7_policy: false
