tailscale:
  serviceMappings:
    web: [web]
    restricted: [restricted-port]
  tags:
    - tag:integration
  serviceTags:
    - tag:integration

listeners:
  web:
    port: 80
    protocol: http
    routes:
      - backend: 127.0.0.1:8080

  restricted-port:
    port: 9999
    protocol: tcp
    backend: 127.0.0.1:8080
