# Example tailvoy policy
# Copy and modify for your deployment
#
# Authorization is defined in your Tailscale ACL policy (policy.hujson)
# using peer capability grants with "rajsingh.info/cap/tailvoy".
# See docs/plans/2026-03-04-cap-based-policy-design.md for details.

tailscale:
  service: "tailvoy-gw"
  clientId: "${TS_CLIENT_ID}"
  clientSecret: "${TS_CLIENT_SECRET}"
  tags:
    - "tag:tailvoy"
  serviceTags:
    - "tag:tailvoy"

listeners:
  - name: https
    protocol: tcp
    listen: ":443"
    forward: "127.0.0.1:10443"
    proxy_protocol: v2
    l7_policy: true

  - name: http
    protocol: tcp
    listen: ":80"
    forward: "127.0.0.1:10080"
    proxy_protocol: v2
    l7_policy: true
