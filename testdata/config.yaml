tailscale:
  service: tailvoy-test
  tags:
    - tag:test
  serviceTags:
    - tag:k8s

listeners:
  https:
    port: 443
    protocol: https
    tls:
      cert: /certs/cert.pem
      key: /certs/key.pem
    routes:
      - backend: envoy:443

  postgres:
    port: 5432
    protocol: tcp
    backend: db-server:5432
