tailscale:
  hostname: "tailvoy-test"
  clientId: "${TS_CLIENT_ID}"
  clientSecret: "${TS_CLIENT_SECRET}"
  tags:
    - "tag:test"
  serviceTags:
    - "tag:k8s"

listeners:
  - name: https
    protocol: tcp
    listen: ":443"
    forward: "envoy:443"
    proxy_protocol: v2
    l7_policy: true

  - name: postgres
    protocol: tcp
    listen: ":5432"
    forward: "db-server:5432"
    l7_policy: false
